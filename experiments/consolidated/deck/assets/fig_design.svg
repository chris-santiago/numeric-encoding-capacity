<polygon points="384.0,368.0 375.0,372.9 375.0,363.1" fill="#6b7280"/>
<rect x="390.0" y="150.0" width="226.0" height="150.0" rx="12" fill="#fff" stroke="#111" stroke-width="2"/>
<text x="503.0" y="196.0" font-size="19" fill="#111" text-anchor="middle" font-weight="bold" font-family="SFMono-Regular,Menlo,monospace">ConsolidatedFlow</text>
<text x="503.0" y="224.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">temperature-calibrated</text>
<text x="503.0" y="246.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">seed-paired 95% CI</text>
<text x="503.0" y="268.0" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="normal">Holm across the family</text>
<line x1="622.0" y1="225.0" x2="670.0" y2="225.0" stroke="#6b7280" stroke-width="2"/>
