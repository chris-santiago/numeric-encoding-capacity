<rect x="676.0" y="92.0" width="344.0" height="60.0" rx="8" fill="#e4f0e6" stroke="#15803d" stroke-width="1.5"/>
<text x="848.0" y="116.0" font-size="16" fill="#15803d" text-anchor="middle" font-weight="bold">Metric: PR-AUC</text>
<text x="848.0" y="138.0" font-size="13" fill="#333" text-anchor="middle" font-weight="normal">raw_gap (deploy) + dc_lift</text>
<rect x="676.0" y="166.0" width="344.0" height="78.0" rx="8" fill="#fde8cc" stroke="#d97706" stroke-width="1.5"/>
<text x="848.0" y="190.0" font-size="15" fill="#d97706" text-anchor="middle" font-weight="bold">Two positive controls</text>
<text x="848.0" y="210.0" font-size="13" fill="#333" text-anchor="middle" font-weight="normal">PLE must detect sharp in the</text>
<text x="848.0" y="226.0" font-size="13" fill="#333" text-anchor="middle" font-weight="normal">static path AND the GRU (hard-halt)</text>
<rect x="676.0" y="258.0" width="344.0" height="52.0" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
<text x="848.0" y="280.0" font-size="15" fill="#6b7280" text-anchor="middle" font-weight="bold">Negative control</text>
<text x="848.0" y="300.0" font-size="13" fill="#333" text-anchor="middle" font-weight="normal">log_linear: no arm beats log</text>
<text x="525.0" y="412.0" font-size="17" fill="#222" text-anchor="middle" font-weight="bold">Same signal held fixed across architectures — so what varies is the model and the shape, not the task.</text>
<text x="525.0" y="438.0" font-size="13" fill="#6b7280" text-anchor="middle" font-weight="normal" font-style="italic">Cross-architecture is not a single-variable manipulation; the within-model controls (GRU projection arm, MLP sharp) carry the cleanest weight.</text>
</svg>