# Consolidated encoding-capacity experiment — Hydra root config.
# method/ is NOT in defaults; methods are named per-experiment and loaded by name.
defaults:
  - data: synth
  - training: default
  - experiment: consolidated
  - _self_

seeds: 8
bootstrap:
  n_resamples: 1000
  seed: 0
max_workers: 1        # default only; SPEED knob (flow is `nondeterministic`, so branch parallelism cannot
                      # change results — per-branch determinism is enforced inside the branch). Override freely
                      # at the CLI, e.g. `run --max-workers 8`.
