# Shared training knobs (authoritative). Method YAMLs carry only kind + encoding.
# Imbalance handling is HARMONIZED across all arms (debate F6): no class weighting
# anywhere. MLPClassifier has no class_weight param, so weighting logreg/hgb but not
# the MLP would re-introduce the F6 asymmetry. PR-AUC is rank-based, so unweighted
# training still yields a meaningful ranking; symmetry is guaranteed by construction.
n_bins: 24                # PLE quantile bins
class_weight: null        # harmonized: no class weighting on any arm
mlp_hidden: [32]          # small MLP for runtime on real data
mlp_max_iter: 80
mlp_alpha: 0.0001
mlp_n_iter_no_change: 10
logreg_max_iter: 2000
budget_fracs: [0.005, 0.01]   # precision@ top-0.5% / top-1% (fixed budgets, debate F7)
fpr_target: 0.01              # recall @ 1% FPR
